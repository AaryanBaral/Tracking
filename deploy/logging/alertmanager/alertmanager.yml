global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: [alertname, service]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: default
    # Runtime-provided receiver endpoint (Slack bridge/PagerDuty webhook/custom alert gateway).
    webhook_configs:
      - url: ${ALERT_WEBHOOK_URL}
        send_resolved: true
